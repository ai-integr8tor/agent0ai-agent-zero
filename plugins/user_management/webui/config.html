<html>
<head>
    <title>User Management</title>
</head>

<body>
    <div x-data>
        <template x-if="config">
            <div>
                <div class="section-title">User Management</div>
                <div class="section-description">
                    Configure multi-user authentication, chat isolation, and token usage tracking.
                    Requires a running PostgreSQL database.
                </div>

                <div class="section-title">Database Connection</div>
                <div class="section-description">
                    PostgreSQL connection URL. Can also be set via the <code>USER_MGMT_DB_URL</code> environment variable.
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Database URL</div>
                        <div class="field-description">
                            PostgreSQL connection string (e.g. <code>postgresql://user:pass@host:5432/dbname</code>)
                        </div>
                    </div>
                    <div class="field-control">
                        <input type="text"
                               x-model="config.db_url"
                               placeholder="postgresql://a0:a0@host.docker.internal:5432/a0_user_mgmt" />
                    </div>
                </div>

                <div class="section-title">Initial Admin Account</div>
                <div class="section-description">
                    Credentials for the initial admin account created during plugin installation.
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Admin Username</div>
                    </div>
                    <div class="field-control">
                        <input type="text"
                               x-model="config.admin_username"
                               placeholder="admin" />
                    </div>
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Admin Default Password</div>
                        <div class="field-description">
                            Only used on first install. Change via admin panel after setup.
                        </div>
                    </div>
                    <div class="field-control">
                        <input type="password"
                               x-model="config.admin_default_password"
                               placeholder="admin123" />
                    </div>
                </div>
            </div>
        </template>
    </div>
</body>
</html>
